name: Sync Beta to Beta Repo

on:
  push:
    branches: [beta]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Push beta branch to beta repository
        run: |
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/volago/asphalt-premium-beta.git beta:master --force
